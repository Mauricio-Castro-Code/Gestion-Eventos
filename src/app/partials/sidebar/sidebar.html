<div class="sidebar-header">
    <div class="logo-circle">G</div>
    <span class="logo-text">GTEA</span>
</div>

<div class="nav-links">
    @for (item of navItems(); track item.label) {
    <a mat-button class="nav-item" [routerLink]="item.link" routerLinkActive="active"
        [routerLinkActiveOptions]="{exact: item.link === '/dashboard'}" [class.disabled]="!item.link">
        <mat-icon>{{ item.icon }}</mat-icon> {{ item.label }}
    </a>
    }
</div>

<!-- Role Switcher for Demo -->
<div class="role-switcher">
    <p>Switch View (Demo):</p>
    <button mat-icon-button (click)="onSwitchRole('admin')" matTooltip="Admin">
        <mat-icon>admin_panel_settings</mat-icon>
    </button>
    <button mat-icon-button (click)="onSwitchRole('organizer')" matTooltip="Organizer">
        <mat-icon>event</mat-icon>
    </button>
    <button mat-icon-button (click)="onSwitchRole('student')" matTooltip="Student">
        <mat-icon>school</mat-icon>
    </button>
</div>
