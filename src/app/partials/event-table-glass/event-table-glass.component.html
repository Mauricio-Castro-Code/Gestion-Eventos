<div class="glass-table-container">
    <div class="table-header">
        <h2>{{ title() }}</h2>
        <div class="header-actions">
            <button class="btn-gradient-neon">
                <i class="fas fa-plus"></i> Nuevo Evento
            </button>
        </div>
    </div>

    <div class="glass-table-wrapper">
        <table mat-table [dataSource]="dataSource" matSort class="glass-mat-table">

            <!-- Status Column -->
            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Estado </th>
                <td mat-cell *matCellDef="let event">
                    <div class="status-indicator">
                        <span class="status-dot" [ngClass]="getStatusClass(event.status)"></span>
                        <span class="status-text">{{ event.status }}</span>
                    </div>
                </td>
            </ng-container>

            <!-- Event Title/Date Column -->
            <ng-container matColumnDef="title">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Evento </th>
                <td mat-cell *matCellDef="let event">
                    <div class="event-info">
                        <span class="event-title">{{ event.title }}</span>
                        <span class="event-date">{{ event.date | date:'mediumDate' }}</span>
                    </div>
                </td>
            </ng-container>

            <!-- Occupancy Column -->
            <ng-container matColumnDef="occupancy">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Ocupación </th>
                <td mat-cell *matCellDef="let event">
                    <div class="occupancy-info">
                        <span class="occupancy-text">{{ event.attendees }}/{{ event.capacity }}</span>
                        <div class="mini-progress">
                            <div class="fill" [style.width.%]="event.capacityPercentage"></div>
                        </div>
                    </div>
                </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Acciones </th>
                <td mat-cell *matCellDef="let event">
                    <div class="actions-desktop">
                        <button mat-icon-button class="action-btn edit" title="Editar">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button class="action-btn view" title="Ver">
                            <mat-icon>visibility</mat-icon>
                        </button>
                        <button mat-icon-button class="action-btn users" title="Asistentes"
                            (click)="onManageEnrollments(event.id)">
                            <mat-icon>group</mat-icon>
                        </button>
                    </div>

                    <!-- Mobile Menu -->
                    <div class="actions-mobile">
                        <button mat-icon-button [matMenuTriggerFor]="menu">
                            <mat-icon>more_vert</mat-icon>
                        </button>
                        <mat-menu #menu="matMenu">
                            <button mat-menu-item>
                                <mat-icon>edit</mat-icon>
                                <span>Editar</span>
                            </button>
                            <button mat-menu-item>
                                <mat-icon>visibility</mat-icon>
                                <span>Ver</span>
                            </button>
                            <button mat-menu-item (click)="onManageEnrollments(event.id)">
                                <mat-icon>group</mat-icon>
                                <span>Asistentes</span>
                            </button>
                            <button mat-menu-item class="text-danger">
                                <mat-icon>cancel</mat-icon>
                                <span>Cancelar</span>
                            </button>
                        </mat-menu>
                    </div>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="floating-row"></tr>

            <!-- Row shown when there is no matching data. -->
            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell" colspan="4">No encontrado</td>
            </tr>
        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page of events"
            class="glass-paginator">
        </mat-paginator>
    </div>
</div>
