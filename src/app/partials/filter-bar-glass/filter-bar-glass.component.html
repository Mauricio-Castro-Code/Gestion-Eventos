<div class="filter-glass-container">
    <!-- Search Input -->
    <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" placeholder="Buscar eventos..." class="glass-input" (input)="onSearch($event)">
    </div>

    <!-- Desktop Filters -->
    <div class="filters-desktop">
        <button class="glass-chip active">Todos</button>
        <button class="glass-chip">Tecnología</button>
        <button class="glass-chip">Diseño</button>
        <button class="glass-chip">Negocios</button>
    </div>

    <!-- Mobile Filter Trigger -->
    <button class="filter-trigger-mobile">
        <i class="fas fa-sliders-h"></i>
        <span>Filtros</span>
    </button>
</div>
