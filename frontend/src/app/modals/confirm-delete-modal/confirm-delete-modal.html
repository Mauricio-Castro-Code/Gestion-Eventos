<h2 mat-dialog-title>{{ data.title || 'Confirmar eliminación' }}</h2>

<mat-dialog-content>
  <p>{{ data.message || '¿Estás seguro que deseas eliminar este elemento?' }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="onCancel()">
    {{ data.cancelLabel || 'Cancelar' }}
  </button>
  <button mat-flat-button color="warn" type="button" (click)="onConfirm()">
    {{ data.confirmLabel || 'Eliminar' }}
  </button>
</mat-dialog-actions>
