<div class="glass-card">
    <div class="card-image-wrapper">
        <div class="badge-ia">IA Powered</div>
        @defer (on viewport) {
        <img [ngSrc]="event().image" [alt]="event().title" width="400" height="220" class="card-image" priority>
        } @placeholder {
        <div class="skeleton-image"></div>
        }
    </div>

    <div class="card-body">
        <h3 class="card-title">{{ event().title }}</h3>
        <p class="card-organizer">
            <i class="fas fa-user-circle"></i>
            {{ event().organizer }}
        </p>

        <div class="card-meta">
            <span class="meta-item">
                <i class="far fa-calendar-alt"></i>
                {{ event().date | date:'shortDate' }}
            </span>
            <span class="meta-item">
                <i class="far fa-clock"></i>
                {{ event().time }}
            </span>
        </div>
    </div>

    <div class="card-footer">
        <div class="progress-container">
            <div class="progress-labels">
                <span>Cupo</span>
                <span>{{ event().capacityPercentage }}%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" [style.width.%]="event().capacityPercentage"></div>
            </div>
        </div>

        <button class="btn-glass-ghost" type="button" (click)="onEnroll()"
            [disabled]="event().isEnrollDisabled">
            {{ event().enrollLabel || 'Inscribirme' }}
            <i class="fas fa-arrow-right"></i>
        </button>
    </div>
</div>
